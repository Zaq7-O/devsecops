name: Merge Workflow

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]

jobs:
  terraform-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: ./terraform
      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ./terraform
      - name: Terraform validate
        run: terraform validate
        working-directory: ./terraform
      - name: tflint
        uses: terraform-linters/setup-tflint@v4
      - name: Run tflint
        run: tflint
        working-directory: ./terraform
      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform
      - name: Infracost breakdown
        uses: infracost/actions@latest
        with:
          path: ./terraform
          format: table
          show-skipped: true
          usage-file: infracost-usage.yml

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0

  docker-build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t app-image ./app
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-image

  app-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: |
          cd app
          npm ci
          npm audit --audit-level=high || true
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./app

  # secret-detection job temporarily disabled to avoid gitleaks pull_request_target error

  docker-compose-test:
    runs-on: ubuntu-latest
    env:
      CI_DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'ci-test-db-password' }}
    services:
      db:
        image: postgres:15.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'ci-test-db-password' }}
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Build and start app
        run: |
          docker build -t app-image ./app
          docker run -d --name app --network host -e DB_HOST=localhost -e DB_USER=postgres -e DB_PASSWORD=${{ env.CI_DB_PASSWORD }} -e DB_NAME=appdb -e DB_PORT=5432 -p 3000:3000 app-image
      - name: Wait for app
        run: |
          for i in {1..10}; do curl -f http://localhost:3000/api/db-check && break || sleep 3; done
      - name: Stop containers
        run: |
          docker stop app || true
          docker rm app || true

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ env.REPO_LC }}/app:${{ github.sha }} -t ghcr.io/${{ env.REPO_LC }}/app:latest ./app
      - name: Push Docker image
        run: docker push ghcr.io/${{ env.REPO_LC }}/app --all-tags
